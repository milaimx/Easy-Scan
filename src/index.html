<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>防重复扫描 PDA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2433;
    --border: #2a3148;
    --green: #00e676;
    --green-dim: #00e67622;
    --red: #ff4d4d;
    --red-dim: #ff4d4d22;
    --orange: #ffaa00;
    --orange-dim: #ffaa0022;
    --blue: #4da6ff;
    --blue-dim: #4da6ff15;
    --text: #e8ecf4;
    --text-muted: #7a8499;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans SC', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }

  /* ── TOP STATUS BAR ── */
  .statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .status-left { display: flex; align-items: center; gap: 10px; }
  .net-indicator {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border);
  }
  .net-indicator .dot {
    width: 7px; height: 7px; border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .net-indicator.online { border-color: #00e67644; background: var(--green-dim); }
  .net-indicator.online .dot { background: var(--green); }
  .net-indicator.offline { border-color: #ff4d4d44; background: var(--red-dim); }
  .net-indicator.offline .dot { background: var(--red); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .sync-badge {
    font-size: 10px; font-family: var(--mono);
    padding: 2px 6px; border-radius: 3px;
    background: var(--orange-dim); color: var(--orange);
    border: 1px solid #ffaa0033;
    display: none;
  }
  .sync-badge.visible { display: block; }

  .count-box {
    text-align: right;
  }
  .count-num {
    font-family: var(--mono); font-size: 28px; font-weight: 700;
    color: var(--green); line-height: 1;
  }
  .count-label { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

  /* ── TOAST / ALERT ── */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
    z-index: 200; min-width: 280px; max-width: 420px;
    padding: 12px 16px; border-radius: 8px;
    font-size: 13px; font-family: var(--mono);
    display: flex; align-items: center; gap: 10px;
    opacity: 0; transition: all .25s ease;
    pointer-events: none; border: 1px solid transparent;
    box-shadow: 0 8px 32px #00000060;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: #001a0d; border-color: #00e67655; color: var(--green); }
  .toast.error   { background: #1a0000; border-color: #ff4d4d55; color: var(--red); }
  .toast.warn    { background: #1a0d00; border-color: #ffaa0055; color: var(--orange); }
  .toast-icon { font-size: 18px; flex-shrink: 0; }
  .toast-msg { flex: 1; line-height: 1.4; }

  /* ── MAIN SCAN AREA ── */
  .scan-area {
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* input field (hidden, PDA scanner inputs here) */
  .barcode-input {
    opacity: 0; position: absolute; top: 0; left: 0;
    width: 1px; height: 1px; pointer-events: none;
  }

  .scan-trigger {
    width: 100%; padding: 16px;
    background: var(--surface2);
    border: 2px dashed var(--border);
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    font-size: 15px; font-family: var(--sans); color: var(--text-muted);
    transition: all .2s;
  }
  .scan-trigger:active, .scan-trigger.active {
    border-color: var(--blue); color: var(--blue);
    background: var(--blue-dim);
  }
  .scan-trigger .scan-icon { font-size: 24px; }

  /* manual input row */
  .manual-row {
    display: flex; gap: 8px;
  }
  .manual-input {
    flex: 1; padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: var(--mono); font-size: 14px;
    outline: none; transition: border .2s;
  }
  .manual-input:focus { border-color: var(--blue); }
  .manual-btn {
    padding: 10px 16px;
    background: var(--blue); color: #000;
    border: none; border-radius: 8px;
    font-weight: 700; font-size: 13px; cursor: pointer;
    font-family: var(--sans);
  }
  .manual-btn:active { opacity: .8; }

  /* filter chips */
  .filter-row {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .filter-label { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
  .prefix-chip {
    font-family: var(--mono); font-size: 11px;
    padding: 2px 8px; border-radius: 4px;
    background: var(--blue-dim); color: var(--blue);
    border: 1px solid #4da6ff33;
  }
  .no-filter { color: var(--text-muted); font-size: 11px; font-family: var(--mono); }

  /* ── LIST ── */
  .list-header {
    padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .list-title { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }
  .list-actions { display: flex; gap: 8px; }
  .action-btn {
    font-size: 11px; padding: 4px 10px; border-radius: 5px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); cursor: pointer; font-family: var(--mono);
    transition: all .15s;
  }
  .action-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .action-btn.danger { border-color: #ff4d4d44; color: var(--red); }
  .action-btn.danger:hover { background: var(--red-dim); }

  .list-container {
    flex: 1; overflow-y: auto;
    padding: 8px 0;
  }
  .list-empty {
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 16px; gap: 12px; color: var(--text-muted);
  }
  .list-empty-icon { font-size: 40px; opacity: .3; }
  .list-empty-text { font-size: 13px; }

  .record-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
    transition: background .15s;
    position: relative;
  }
  .record-item.new-item {
    animation: itemIn .3s ease;
  }
  .record-item.highlight {
    background: var(--red-dim);
    animation: flash .5s ease 2;
  }
  @keyframes itemIn { from { opacity:0; transform: translateX(-12px); } to { opacity:1; transform: translateX(0); } }
  @keyframes flash { 0%,100%{background: var(--red-dim)} 50%{background: #ff4d4d44} }

  .record-num {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-muted); min-width: 32px; text-align: right;
  }
  .record-barcode {
    font-family: var(--mono); font-size: 14px; color: var(--text); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .record-time {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted);
    white-space: nowrap;
  }
  .sync-status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0;
  }
  .sync-status-dot.synced { background: var(--green); opacity: .6; }
  .sync-status-dot.pending { background: var(--orange); opacity: .8; }

  /* ── NAV TABS ── */
  .nav-tabs {
    display: flex; background: var(--surface);
    border-top: 1px solid var(--border);
    position: sticky; bottom: 0; z-index: 100;
  }
  .nav-tab {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 10px 4px;
    cursor: pointer; color: var(--text-muted);
    font-size: 10px; border: none; background: none;
    transition: color .15s; font-family: var(--sans);
  }
  .nav-tab .tab-icon { font-size: 20px; }
  .nav-tab.active { color: var(--blue); }

  /* ── SETTINGS PANEL ── */
  .panel {
    display: none; flex-direction: column; overflow-y: auto;
    flex: 1;
  }
  .panel.visible { display: flex; }

  .settings-group {
    margin: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .settings-group-title {
    padding: 8px 12px;
    font-size: 11px; color: var(--text-muted);
    font-family: var(--mono);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    letter-spacing: .05em;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 12px; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 13px; color: var(--text); flex: 1; }
  .settings-sub { font-size: 11px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }
  .settings-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: var(--mono); font-size: 12px;
    padding: 6px 8px; width: 120px; outline: none;
    transition: border .2s;
  }
  .settings-input:focus { border-color: var(--blue); }
  .settings-input.wide { width: 100%; margin-top: 8px; }
  .settings-row.col { flex-direction: column; align-items: flex-start; }

  /* toggle */
  .toggle {
    width: 44px; height: 24px; border-radius: 12px;
    background: var(--border); position: relative; cursor: pointer;
    transition: background .2s; flex-shrink: 0;
    border: none;
  }
  .toggle::after {
    content: ''; position: absolute;
    width: 18px; height: 18px; border-radius: 50%;
    background: white; top: 3px; left: 3px;
    transition: transform .2s;
  }
  .toggle.on { background: var(--blue); }
  .toggle.on::after { transform: translateX(20px); }

  /* prefix tags */
  .prefix-tags {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
  }
  .prefix-tag {
    font-family: var(--mono); font-size: 12px;
    padding: 3px 8px; border-radius: 4px;
    background: var(--blue-dim); color: var(--blue);
    border: 1px solid #4da6ff33;
    display: flex; align-items: center; gap: 4px;
  }
  .prefix-tag-del {
    cursor: pointer; color: var(--red); font-size: 14px;
    line-height: 1; opacity: .6;
  }
  .prefix-tag-del:hover { opacity: 1; }
  .prefix-add-row { display: flex; gap: 6px; margin-top: 8px; }
  .prefix-add-input {
    flex: 1; padding: 6px 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: var(--mono); font-size: 12px; outline: none;
  }
  .prefix-add-input:focus { border-color: var(--blue); }
  .prefix-add-btn {
    padding: 6px 12px; background: var(--blue); color: #000;
    border: none; border-radius: 6px; font-weight: 700; cursor: pointer;
    font-size: 12px;
  }

  .save-btn {
    margin: 8px 16px 16px;
    width: calc(100% - 32px);
    padding: 13px;
    background: var(--blue); color: #000; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: var(--sans);
  }
  .save-btn:active { opacity: .85; }

  .webdav-test-btn {
    padding: 6px 12px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    border-radius: 6px; font-size: 12px; cursor: pointer;
    font-family: var(--mono); transition: all .15s;
  }
  .webdav-test-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: #000000aa;
    z-index: 300; display: flex; align-items: center; justify-content: center;
    padding: 24px; opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; width: 100%; max-width: 340px;
    transform: scale(.95); transition: transform .2s;
  }
  .modal-overlay.visible .modal { transform: scale(1); }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
  .modal-body { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btn {
    padding: 9px 18px; border-radius: 8px; font-size: 13px;
    cursor: pointer; font-family: var(--sans); border: none; font-weight: 500;
  }
  .modal-btn.cancel { background: var(--surface); color: var(--text-muted); }
  .modal-btn.confirm { background: var(--red); color: white; }
  .modal-btn.force { background: var(--orange); color: #000; }

  /* progress bar */
  .progress-bar-wrap {
    height: 4px; background: var(--border); border-radius: 2px;
    margin: 12px 0; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: var(--blue); border-radius: 2px;
    width: 0%; transition: width .3s;
  }
  .progress-text { font-size: 12px; color: var(--text-muted); font-family: var(--mono); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Hidden barcode input (PDA scanner types here) -->
<input class="barcode-input" id="barcodeInput" type="text" autocomplete="off" autocorrect="off" spellcheck="false">

<!-- Toast notification -->
<div class="toast" id="toast">
  <span class="toast-icon" id="toastIcon"></span>
  <span class="toast-msg" id="toastMsg"></span>
</div>

<!-- Status Bar -->
<div class="statusbar">
  <div class="status-left">
    <div class="net-indicator" id="netIndicator">
      <div class="dot"></div>
      <span id="netLabel">检查中</span>
    </div>
    <div class="sync-badge" id="syncBadge">⬆ 待同步</div>
  </div>
  <div class="count-box">
    <div class="count-num" id="countNum">0</div>
    <div class="count-label">已扫条码</div>
  </div>
</div>

<!-- SCAN PANEL -->
<div class="panel visible" id="panelScan">

  <div class="scan-area">
    <!-- PDA Trigger -->
    <div class="scan-trigger" id="scanTrigger" onclick="activateScanner()">
      <span class="scan-icon">📷</span>
      <span>点击激活扫描枪输入</span>
    </div>

    <!-- Manual Input (fallback) -->
    <div class="manual-row">
      <input class="manual-input" id="manualInput" placeholder="手动输入条码..." type="text" autocomplete="off">
      <button class="manual-btn" onclick="submitManual()">确认</button>
    </div>

    <!-- Active prefix filters -->
    <div class="filter-row">
      <span class="filter-label">前缀过滤：</span>
      <span id="prefixDisplay" class="no-filter">无（接受所有条码）</span>
    </div>
  </div>

  <!-- List -->
  <div class="list-header">
    <span class="list-title">SCAN RECORDS</span>
    <div class="list-actions">
      <button class="action-btn" onclick="exportData()">⬇ 导出</button>
      <button class="action-btn danger" onclick="confirmClear()">清空</button>
    </div>
  </div>

  <div class="list-container" id="listContainer">
    <div class="list-empty" id="listEmpty">
      <div class="list-empty-icon">📦</div>
      <div class="list-empty-text">暂无扫描记录<br>点击上方激活扫描枪</div>
    </div>
  </div>
</div>

<!-- SETTINGS PANEL -->
<div class="panel" id="panelSettings">
  <div class="settings-group">
    <div class="settings-group-title">扫描规则</div>

    <div class="settings-row col">
      <div>
        <div class="settings-label">前缀过滤规则</div>
        <div class="settings-sub">留空则接受所有条码</div>
      </div>
      <div class="prefix-tags" id="prefixTags"></div>
      <div class="prefix-add-row" style="width:100%">
        <input class="prefix-add-input" id="prefixAddInput" placeholder="输入前缀，如 465">
        <button class="prefix-add-btn" onclick="addPrefix()">+ 添加</button>
      </div>
    </div>

    <div class="settings-row">
      <div>
        <div class="settings-label">条码最短长度</div>
      </div>
      <input class="settings-input" id="minLen" type="number" value="1" min="1">
    </div>

    <div class="settings-row">
      <div>
        <div class="settings-label">条码最长长度</div>
      </div>
      <input class="settings-input" id="maxLen" type="number" value="100" max="500">
    </div>

    <div class="settings-row">
      <div>
        <div class="settings-label">连续扫码模式</div>
        <div class="settings-sub">扫完自动准备下一次</div>
      </div>
      <button class="toggle" id="continuousToggle" onclick="toggleContinuous()"></button>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">WebDAV 云备份</div>

    <div class="settings-row col">
      <div class="settings-label">服务器地址</div>
      <input class="settings-input wide" id="webdavUrl" placeholder="https://dav.example.com/scans/" type="url">
    </div>

    <div class="settings-row">
      <div class="settings-label">用户名</div>
      <input class="settings-input" id="webdavUser" placeholder="admin">
    </div>

    <div class="settings-row">
      <div class="settings-label">密码</div>
      <input class="settings-input" id="webdavPass" type="password" placeholder="••••••">
    </div>

    <div class="settings-row col">
      <div class="settings-label">上传路径</div>
      <input class="settings-input wide" id="webdavPath" placeholder="/barcode-backups/" value="/">
    </div>

    <div class="settings-row">
      <div>
        <div class="settings-label">连接测试</div>
        <div class="settings-sub">验证 WebDAV 配置是否可用</div>
      </div>
      <button class="webdav-test-btn" onclick="testWebDAV()">测试连接</button>
    </div>
  </div>

  <div class="settings-group">
    <div class="settings-group-title">导出设置</div>
    <div class="settings-row">
      <div class="settings-label">文件名模板</div>
      <input class="settings-input" id="fileTemplate" value="scan_export">
    </div>
  </div>

  <button class="save-btn" onclick="saveSettings()">保存设置</button>
</div>

<!-- NAV TABS -->
<nav class="nav-tabs">
  <button class="nav-tab active" id="tabScan" onclick="switchTab('scan')">
    <span class="tab-icon">📷</span>
    <span>扫描</span>
  </button>
  <button class="nav-tab" id="tabSettings" onclick="switchTab('settings')">
    <span class="tab-icon">⚙️</span>
    <span>设置</span>
  </button>
</nav>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-title" id="modalTitle">确认清空？</div>
    <div class="modal-body" id="modalBody"></div>
    <div class="progress-bar-wrap" id="modalProgress" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const DB_KEY = 'pda_records';
const SET_KEY = 'pda_settings';
const PENDING_KEY = 'pda_pending_sync';

let records = [];       // { id, barcode, time, synced }
let pendingSync = [];   // barcodes to sync when online
let nextId = 1;
let isOnline = navigator.onLine;
let settings = {
  prefixes: [],
  minLen: 1,
  maxLen: 100,
  continuous: false,
  webdavUrl: '',
  webdavUser: '',
  webdavPass: '',
  webdavPath: '/',
  fileTemplate: 'scan_export'
};
let scannerActive = false;
let barcodeBuffer = '';
let bufferTimer = null;
let toastTimer = null;

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init() {
  loadSettings();
  loadRecords();
  loadPending();
  updateNetworkUI();
  renderPrefixDisplay();
  renderList();

  // Focus hidden input for PDA scanner
  window.addEventListener('click', ensureFocus);
  document.getElementById('barcodeInput').addEventListener('keydown', handleScannerKey);
  document.getElementById('barcodeInput').addEventListener('input', handleScannerInput);

  window.addEventListener('online', () => { isOnline = true; updateNetworkUI(); trySyncPending(); });
  window.addEventListener('offline', () => { isOnline = false; updateNetworkUI(); });

  // Keep scanner active
  setInterval(() => { if (scannerActive) ensureFocus(); }, 1000);

  // manual input enter
  document.getElementById('manualInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitManual();
  });
}

function ensureFocus() {
  if (scannerActive && document.activeElement !== document.getElementById('manualInput')) {
    document.getElementById('barcodeInput').focus();
  }
}

// ═══════════════════════════════════════════
//  PERSIST (localStorage as SQLite substitute)
// ═══════════════════════════════════════════
function loadRecords() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) {
      records = JSON.parse(raw);
      nextId = records.length ? Math.max(...records.map(r => r.id)) + 1 : 1;
    }
  } catch(e) { records = []; }
}

function saveRecords() {
  try { localStorage.setItem(DB_KEY, JSON.stringify(records)); } catch(e) {}
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(SET_KEY);
    if (raw) settings = { ...settings, ...JSON.parse(raw) };
  } catch(e) {}
  applySettingsToUI();
}

function saveSettingsStore() {
  try { localStorage.setItem(SET_KEY, JSON.stringify(settings)); } catch(e) {}
}

function loadPending() {
  try {
    const raw = localStorage.getItem(PENDING_KEY);
    if (raw) pendingSync = JSON.parse(raw);
  } catch(e) { pendingSync = []; }
}

function savePending() {
  try { localStorage.setItem(PENDING_KEY, JSON.stringify(pendingSync)); } catch(e) {}
}

// ═══════════════════════════════════════════
//  NETWORK
// ═══════════════════════════════════════════
function updateNetworkUI() {
  const el = document.getElementById('netIndicator');
  const label = document.getElementById('netLabel');
  if (isOnline) {
    el.className = 'net-indicator online';
    label.textContent = '在线';
  } else {
    el.className = 'net-indicator offline';
    label.textContent = '离线';
  }
  updateSyncBadge();
}

function updateSyncBadge() {
  const badge = document.getElementById('syncBadge');
  if (pendingSync.length > 0) {
    badge.textContent = `⬆ ${pendingSync.length} 待同步`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

// ═══════════════════════════════════════════
//  SCANNER INPUT (PDA)
// ═══════════════════════════════════════════
function activateScanner() {
  scannerActive = !scannerActive;
  const btn = document.getElementById('scanTrigger');
  if (scannerActive) {
    btn.classList.add('active');
    btn.innerHTML = '<span class="scan-icon">✅</span><span>扫描枪已激活 — 对准条码扫描</span>';
    document.getElementById('barcodeInput').focus();
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '<span class="scan-icon">📷</span><span>点击激活扫描枪输入</span>';
  }
}

function handleScannerKey(e) {
  if (e.key === 'Enter') {
    const val = document.getElementById('barcodeInput').value.trim();
    if (val) {
      processBarcode(val);
      document.getElementById('barcodeInput').value = '';
    }
    e.preventDefault();
  }
}

// Some PDA scanners don't send Enter — buffer approach
function handleScannerInput(e) {
  clearTimeout(bufferTimer);
  bufferTimer = setTimeout(() => {
    const val = document.getElementById('barcodeInput').value.trim();
    if (val.length >= settings.minLen) {
      processBarcode(val);
      document.getElementById('barcodeInput').value = '';
    }
  }, 150);
}

function submitManual() {
  const val = document.getElementById('manualInput').value.trim();
  if (!val) return;
  processBarcode(val);
  document.getElementById('manualInput').value = '';
}

// ═══════════════════════════════════════════
//  CORE LOGIC
// ═══════════════════════════════════════════
function processBarcode(code) {
  // Length check
  if (code.length < settings.minLen || code.length > settings.maxLen) {
    showToast('warn', '⚠️', `条码长度 ${code.length} 超出范围 (${settings.minLen}-${settings.maxLen})`);
    vibrate(200);
    return;
  }

  // Prefix check
  if (settings.prefixes.length > 0) {
    const match = settings.prefixes.some(p => code.startsWith(p));
    if (!match) {
      showToast('error', '🔴', `前缀不匹配：${code}`);
      vibrate(200);
      return;
    }
  }

  // Duplicate check
  const existing = records.find(r => r.barcode === code);
  if (existing) {
    showToast('error', '🔴', `重复！「${code}」已在第 ${existing.id} 条扫入`);
    vibrate(200);
    // Highlight existing row
    const row = document.getElementById(`row-${existing.id}`);
    if (row) {
      row.classList.add('highlight');
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      setTimeout(() => row.classList.remove('highlight'), 2000);
    }
    return;
  }

  // ✅ Add record
  const now = new Date();
  const record = {
    id: nextId++,
    barcode: code,
    time: formatTime(now),
    synced: false
  };
  records.unshift(record);
  saveRecords();

  // Add to pending sync
  pendingSync.push({ barcode: code, time: record.time });
  savePending();
  updateSyncBadge();

  // Try background sync if online
  if (isOnline && settings.webdavUrl) {
    trySyncPending();
  }

  updateCount();
  prependListItem(record);
  showToast('success', '✅', `扫描成功：${code}`);
}

function formatTime(d) {
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
function p(n) { return String(n).padStart(2, '0'); }

function vibrate(ms) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

// ═══════════════════════════════════════════
//  WEBDAV SYNC
// ═══════════════════════════════════════════
async function uploadToWebDAV(content, filename) {
  if (!settings.webdavUrl) return { ok: false, msg: '未配置 WebDAV 地址' };
  try {
    const url = settings.webdavUrl.replace(/\/$/, '') + (settings.webdavPath || '/') + filename;
    const headers = { 'Content-Type': 'text/plain; charset=utf-8' };
    if (settings.webdavUser) {
      headers['Authorization'] = 'Basic ' + btoa(`${settings.webdavUser}:${settings.webdavPass}`);
    }
    const resp = await fetch(url, { method: 'PUT', headers, body: content });
    if (resp.ok || resp.status === 201 || resp.status === 204) {
      return { ok: true };
    }
    return { ok: false, msg: `HTTP ${resp.status}` };
  } catch(e) {
    return { ok: false, msg: e.message };
  }
}

async function trySyncPending() {
  if (!isOnline || !settings.webdavUrl || pendingSync.length === 0) return;
  // In real app: sync individual records. Here: batch upload pending
  const content = pendingSync.map(r => `${r.time}\t${r.barcode}`).join('\n');
  const filename = `pending_${Date.now()}.txt`;
  const result = await uploadToWebDAV(content, filename);
  if (result.ok) {
    pendingSync = [];
    savePending();
    records = records.map(r => ({ ...r, synced: true }));
    saveRecords();
    updateSyncBadge();
    renderList();
  }
}

async function testWebDAV() {
  if (!settings.webdavUrl) { showToast('warn', '⚠️', '请先填写服务器地址'); return; }
  showToast('warn', '⏳', '正在测试连接…');
  const result = await uploadToWebDAV('test', '_test_connection.txt');
  if (result.ok) {
    showToast('success', '✅', 'WebDAV 连接成功！');
  } else {
    showToast('error', '❌', `连接失败：${result.msg}`);
  }
}

// ═══════════════════════════════════════════
//  CLEAR + BACKUP FLOW
// ═══════════════════════════════════════════
function confirmClear() {
  if (records.length === 0) { showToast('warn', '⚠️', '当前无数据可清空'); return; }
  showModal('确认清空数据？',
    `共 ${records.length} 条记录将被清空。清空前将自动备份至 WebDAV 服务器。`,
    [
      { label: '取消', cls: 'cancel', fn: closeModal },
      { label: '确认清空', cls: 'confirm', fn: executeClear }
    ]
  );
}

async function executeClear() {
  // Step 1: Generate backup content
  const ts = new Date();
  const tsStr = `${ts.getFullYear()}${p(ts.getMonth()+1)}${p(ts.getDate())}_${p(ts.getHours())}${p(ts.getMinutes())}${p(ts.getSeconds())}`;
  const filename = `${settings.fileTemplate}_backup_${tsStr}.txt`;
  const content = records.map(r => `${r.id}\t${r.time}\t${r.barcode}`).join('\n');

  // Show progress
  document.getElementById('modalBody').textContent = '正在生成备份文件…';
  document.getElementById('modalProgress').style.display = 'block';
  document.getElementById('progressBar').style.width = '30%';
  document.getElementById('progressText').textContent = '备份中…';
  document.getElementById('modalActions').innerHTML = '';

  // Step 2: Upload
  if (settings.webdavUrl && isOnline) {
    document.getElementById('progressBar').style.width = '60%';
    document.getElementById('progressText').textContent = '上传至 WebDAV…';
    const result = await uploadToWebDAV(content, filename);
    document.getElementById('progressBar').style.width = '90%';

    if (!result.ok) {
      document.getElementById('modalBody').innerHTML = `<span style="color:var(--orange)">⚠️ 备份失败：${result.msg}</span><br><br>是否仍然清空数据？`;
      document.getElementById('modalProgress').style.display = 'none';
      document.getElementById('progressText').textContent = '';
      document.getElementById('modalActions').innerHTML = '';
      addModalBtn('取消', 'cancel', closeModal);
      addModalBtn('强制清空', 'force', doLocalClear);
      return;
    }
  } else if (!isOnline) {
    document.getElementById('modalBody').innerHTML = `<span style="color:var(--orange)">⚠️ 当前离线，无法备份至服务器。</span><br><br>数据将保存本地导出文件后清空。`;
    document.getElementById('modalProgress').style.display = 'none';
    // Offer local download
    downloadLocal(content, filename);
    addModalBtn('取消', 'cancel', closeModal);
    addModalBtn('清空（已本地保存）', 'force', doLocalClear);
    return;
  }

  // Step 3: Clear
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressText').textContent = '备份成功，正在清空…';
  setTimeout(() => {
    doLocalClear();
    showToast('success', '✅', `备份成功，数据已清空 → ${filename}`);
  }, 400);
}

function addModalBtn(label, cls, fn) {
  const btn = document.createElement('button');
  btn.className = `modal-btn ${cls}`;
  btn.textContent = label;
  btn.onclick = fn;
  document.getElementById('modalActions').appendChild(btn);
}

function doLocalClear() {
  records = [];
  nextId = 1;
  pendingSync = [];
  saveRecords();
  savePending();
  updateCount();
  renderList();
  updateSyncBadge();
  closeModal();
}

// ═══════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════
function exportData() {
  if (records.length === 0) { showToast('warn', '⚠️', '暂无数据可导出'); return; }
  const ts = new Date();
  const tsStr = `${ts.getFullYear()}${p(ts.getMonth()+1)}${p(ts.getDate())}_${p(ts.getHours())}${p(ts.getMinutes())}`;
  const filename = `${settings.fileTemplate}_${tsStr}.txt`;
  const content = records.map(r => `${r.id}\t${r.time}\t${r.barcode}`).join('\n');
  downloadLocal(content, filename);
  showToast('success', '✅', `已导出 ${filename}`);
}

function downloadLocal(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════
function applySettingsToUI() {
  document.getElementById('minLen').value = settings.minLen;
  document.getElementById('maxLen').value = settings.maxLen;
  document.getElementById('webdavUrl').value = settings.webdavUrl;
  document.getElementById('webdavUser').value = settings.webdavUser;
  document.getElementById('webdavPass').value = settings.webdavPass;
  document.getElementById('webdavPath').value = settings.webdavPath;
  document.getElementById('fileTemplate').value = settings.fileTemplate;
  const tog = document.getElementById('continuousToggle');
  if (settings.continuous) tog.classList.add('on');
  renderPrefixTags();
}

function saveSettings() {
  settings.minLen = parseInt(document.getElementById('minLen').value) || 1;
  settings.maxLen = parseInt(document.getElementById('maxLen').value) || 100;
  settings.webdavUrl = document.getElementById('webdavUrl').value.trim();
  settings.webdavUser = document.getElementById('webdavUser').value.trim();
  settings.webdavPass = document.getElementById('webdavPass').value;
  settings.webdavPath = document.getElementById('webdavPath').value.trim() || '/';
  settings.fileTemplate = document.getElementById('fileTemplate').value.trim() || 'scan_export';
  saveSettingsStore();
  renderPrefixDisplay();
  showToast('success', '✅', '设置已保存');
  switchTab('scan');
}

function toggleContinuous() {
  settings.continuous = !settings.continuous;
  const tog = document.getElementById('continuousToggle');
  settings.continuous ? tog.classList.add('on') : tog.classList.remove('on');
}

function addPrefix() {
  const input = document.getElementById('prefixAddInput');
  const val = input.value.trim();
  if (!val) return;
  if (!settings.prefixes.includes(val)) {
    settings.prefixes.push(val);
    renderPrefixTags();
  }
  input.value = '';
}

function removePrefix(p) {
  settings.prefixes = settings.prefixes.filter(x => x !== p);
  renderPrefixTags();
  renderPrefixDisplay();
}

function renderPrefixTags() {
  const container = document.getElementById('prefixTags');
  if (settings.prefixes.length === 0) {
    container.innerHTML = '<span style="font-size:11px;color:var(--text-muted);font-family:var(--mono)">无前缀限制</span>';
    return;
  }
  container.innerHTML = settings.prefixes.map(p =>
    `<div class="prefix-tag">${p}<span class="prefix-tag-del" onclick="removePrefix('${p}')">×</span></div>`
  ).join('');
}

function renderPrefixDisplay() {
  const el = document.getElementById('prefixDisplay');
  if (settings.prefixes.length === 0) {
    el.outerHTML = `<span id="prefixDisplay" class="no-filter">无（接受所有条码）</span>`;
    return;
  }
  const chips = settings.prefixes.map(p => `<span class="prefix-chip">${p}</span>`).join('');
  const fresh = document.getElementById('prefixDisplay') || document.createElement('span');
  fresh.id = 'prefixDisplay';
  fresh.className = '';
  fresh.style.display = 'flex';
  fresh.style.gap = '4px';
  fresh.style.flexWrap = 'wrap';
  fresh.innerHTML = chips;
}

// prefix add on Enter
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('prefixAddInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPrefix();
  });
});

// ═══════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════
function updateCount() {
  document.getElementById('countNum').textContent = records.length;
}

function renderList() {
  const container = document.getElementById('listContainer');
  const empty = document.getElementById('listEmpty');
  if (records.length === 0) {
    container.innerHTML = '';
    container.appendChild(createEmptyEl());
    return;
  }
  container.innerHTML = records.map((r, i) => recordHTML(r, records.length - i)).join('');
  updateCount();
}

function createEmptyEl() {
  const d = document.createElement('div');
  d.className = 'list-empty'; d.id = 'listEmpty';
  d.innerHTML = '<div class="list-empty-icon">📦</div><div class="list-empty-text">暂无扫描记录<br>点击上方激活扫描枪</div>';
  return d;
}

function prependListItem(record) {
  const container = document.getElementById('listContainer');
  // Remove empty state
  const empty = document.getElementById('listEmpty');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.innerHTML = recordHTML(record, records.length);
  const el = div.firstElementChild;
  container.prepend(el);
  // Re-number remaining items... skip for perf; show correct id
  updateCount();
}

function recordHTML(r, displayNum) {
  const dot = r.synced
    ? '<div class="sync-status-dot synced" title="已同步"></div>'
    : '<div class="sync-status-dot pending" title="待同步"></div>';
  return `<div class="record-item new-item" id="row-${r.id}">
    <span class="record-num">#${r.id}</span>
    <span class="record-barcode">${r.barcode}</span>
    <span class="record-time">${r.time.substring(11)}</span>
    ${dot}
  </div>`;
}

function showToast(type, icon, msg) {
  clearTimeout(toastTimer);
  const toast = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent = msg;
  toast.className = `toast ${type} show`;
  const dur = type === 'success' ? 1800 : 3000;
  toastTimer = setTimeout(() => toast.classList.remove('show'), dur);
}

function switchTab(tab) {
  document.getElementById('panelScan').classList.toggle('visible', tab === 'scan');
  document.getElementById('panelSettings').classList.toggle('visible', tab === 'settings');
  document.getElementById('tabScan').classList.toggle('active', tab === 'scan');
  document.getElementById('tabSettings').classList.toggle('active', tab === 'settings');
  if (tab === 'settings') applySettingsToUI();
}

function showModal(title, body, buttons) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('modalProgress').style.display = 'none';
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressText').textContent = '';
  const actions = document.getElementById('modalActions');
  actions.innerHTML = '';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = `modal-btn ${b.cls}`;
    btn.textContent = b.label;
    btn.onclick = b.fn;
    actions.appendChild(btn);
  });
  document.getElementById('modalOverlay').classList.add('visible');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('visible');
}

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
init();
</script>
